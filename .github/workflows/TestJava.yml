# TestJava.yml
# GitHub Actions — Automated Unit Tests for ChatApp
# Runs all JUnit tests in MesseageTest.java on every push and pull request

name: Run ChatApp Unit Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Java 11
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # Step 3: Download JUnit 4 and org.json jars
      - name: Download dependencies
        run: |
          mkdir -p lib
          curl -L -o lib/junit-4.13.2.jar https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar
          curl -L -o lib/hamcrest-core-1.3.jar https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar
          curl -L -o lib/json-20231013.jar https://repo1.maven.org/maven2/org/json/json/20231013/json-20231013.jar

      # Step 4: Compile all Java source files
      - name: Compile source files
        run: |
          mkdir -p out
          javac -cp "lib/junit-4.13.2.jar:lib/hamcrest-core-1.3.jar:lib/json-20231013.jar" \
            -d out \
            chat.java \
            Message.java \
            Chatapp_registration_login.java \
            MesseageTest.java

      # Step 5: Run the unit tests
      - name: Run JUnit tests
        run: |
          java -cp "out:lib/junit-4.13.2.jar:lib/hamcrest-core-1.3.jar:lib/json-20231013.jar" \
            org.junit.runner.JUnitCore \
            chatapp_registration_login.MesseageTest
